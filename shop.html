<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch Gallery</title>
  <link rel="stylesheet" href="shop.css" />
</head>
<body>
  <div class="gallery">
    <!-- Card 1 -->
    <div class="shop_watch-card">
      <img src="images/ap_1.jpg" alt="Royal Oak Watch" class="watch-image">
      <p class="reference">26605CB.OO.1248CB.01</p>
      <h2 class="model">Royal Oak</h2>
      <p class="description">Grande Complication</p>
      <p class="details">44mm, White ceramic</p>
    </div>

    <!-- Card 2 -->
    <div class="shop_watch-card">
      <img src="images/ap_2.jpg" alt="Chronograph" class="watch-img"/>
      <p class="ref">26393NR.OO.A002KB.02</p>
      <h3 class="title">Code 11.59 by Audemars Piguet</h3>
      <p class="model">Selfwinding Chronograph</p>
      <p class="details">41mm, Black ceramic</p>
    </div>

    <!-- Adaugă mai multe carduri similar -->
  </div>

  <script src="script.js"></script>
</body>
</html>
