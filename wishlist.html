<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist | Timeless Luxury Watches</title>
  <link rel="stylesheet" href="wishlist.css" />
</head>

<body>

  <!-- Navigation Bar -->
  <header class="menu">
    <nav>
      <ul>
        <li><a id="navHome" href="index.html">Home</a></li>
        <li><a id="navShop" href="shop.html">Shop</a></li>
        <li><a id="navAbout" href="about_us.html">About Us</a></li>
        <li><a id="navContact" href="contact_us.html">Contact Us</a></li>
        <li><a id="navConsult" href="consultation.html">Consultation</a></li>
        <li><a id="navWishlist" href="wishlist.html">Wishlist ♡</a></li>
      </ul>

      <!-- Theme Toggle Button -->
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        🌙 Dark
      </button>
    </nav>
  </header>

  <main>
    <!-- Page Intro -->
    <section class="wishlist-intro">
      <h1>Your Wishlist</h1>
      <p>Saved watches — <span id="wishlist-count">0</span> item(s)</p>
    </section>

    <!-- Grid / Empty state -->
    <div class="wishlist-grid-wrapper">
      <!-- Empty state (hidden when items exist) -->
      <div id="wishlist-empty">
        <span class="empty-icon">♡</span>
        <h2>Nothing saved yet</h2>
        <p>Browse the shop and tap the heart on any watch to save it here.</p>
        <a href="shop.html">Go to Shop</a>
      </div>

      <!-- Item grid (populated by wishlist.js) -->
      <div id="wishlist-grid"></div>
    </div>
  </main>

  <footer>
    <p id="footerText">&copy; 2025 TIMELESS watches | All Rights Reserved</p>
  </footer>

  <!-- Theme Toggle Script -->
  <script>
    const toggleBtn = document.getElementById("theme-toggle");
    const body = document.body;

    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "dark") {
      body.classList.add("dark-theme");
      toggleBtn.textContent = "☀️ Light";
    }

    toggleBtn.addEventListener("click", () => {
      body.classList.toggle("dark-theme");
      const isDark = body.classList.contains("dark-theme");
      toggleBtn.textContent = isDark ? "☀️ Light" : "🌙 Dark";
      localStorage.setItem("theme", isDark ? "dark" : "light");
    });
  </script>

  <!-- Content Script -->
  <script src="app.js" defer></script>
  <!-- Wishlist Script -->
  <script src="wishlist.js" defer></script>

</body>

</html>
